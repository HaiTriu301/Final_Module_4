<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa loại sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container my-4">
    <h2 class="mb-4">Sửa loại sản phẩm</h2>

    <form th:action="@{/loai-san-pham/edit/{id}(id=${loaiSanPham.id})}" th:object="${loaiSanPham}" method="post" class="col-md-6">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Tên loại sản phẩm</label>
            <input type="text" th:field="*{name}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/loai-san-pham}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</body>
</html>
