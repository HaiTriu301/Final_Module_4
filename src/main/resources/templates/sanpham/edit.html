<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa sản phẩm đấu giá</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container my-4">
    <h2 class="mb-4">Sửa sản phẩm đấu giá</h2>

    <form th:action="@{/san-pham/edit/{id}(id=${sanPham.id})}" th:object="${sanPham}" method="post" class="col-md-6">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Tên sản phẩm</label>
            <input type="text" th:field="*{name}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Giá bắt đầu (VNĐ)</label>
            <input type="number" step="1" th:field="*{price}" class="form-control">
            <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Trạng thái</label>
            <input type="text" th:field="*{status}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Loại sản phẩm</label>
            <select th:field="*{loaiSanPham}" class="form-select">
                <option th:each="loai : ${loaiSanPhamList}"
                        th:value="${loai.id}"
                        th:text="${loai.name}">
                </option>
            </select>
            <div class="text-danger" th:if="${#fields.hasErrors('loaiSanPham')}" th:errors="*{loaiSanPham}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Lưu</button>
        <a th:href="@{/san-pham}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
</body>
</html>
