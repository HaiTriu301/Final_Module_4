<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm bán đấu giá</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container my-4">

    <h2 class="mb-4">Quản lý sản phẩm bán đấu giá</h2>

    <!-- Form tim kiem -->
    <form th:action="@{/san-pham}" method="get" class="row g-2 align-items-end mb-3">
        <div class="col-md-3">
            <label class="form-label">Tên sản phẩm</label>
            <input type="text" name="name" th:value="${name}" class="form-control" placeholder="Nhập tên sản phẩm">
        </div>
        <div class="col-md-2">
            <label class="form-label">Giá bắt đầu</label>
            <input type="number" name="price" th:value="${price}" class="form-control" placeholder="VD: 100000">
        </div>
        <div class="col-md-3">
            <label class="form-label">Loại sản phẩm</label>
            <select name="idLoaiSp" class="form-select">
                <option value="">-- Tất cả --</option>
                <option th:each="loai : ${loaiSanPhamList}"
                        th:value="${loai.id}"
                        th:text="${loai.name}"
                        th:selected="${idLoaiSp != null and idLoaiSp == loai.id}">
                </option>
            </select>
        </div>
        <div class="col-md-4">
            <button type="submit" class="btn btn-primary">Tìm kiếm</button>
            <a th:href="@{/san-pham}" class="btn btn-secondary">Xóa filter</a>
            <a th:href="@{/san-pham/create}" class="btn btn-success">+ Thêm sản phẩm</a>
            <a th:href="@{/loai-san-pham}" class="btn btn-outline-primary">Quản lý loại sản phẩm</a>
        </div>
    </form>

    <!-- Form xoa (bao boc ca bang de submit checkbox da chon) -->
    <form id="deleteForm" th:action="@{/san-pham/delete}" method="post">

        <div class="mb-2">
            <button type="button" id="btnDelete" class="btn btn-danger" disabled>Xóa đã chọn</button>
        </div>

        <table class="table table-bordered table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>STT</th>
                <th>Chọn</th>
                <th>Tên sản phẩm</th>
                <th>Giá khởi điểm</th>
                <th>Loại sản phẩm</th>
                <th>Tình trạng</th>
                <th>Sửa</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${sanPhamPage.content.size() == 0}">
                <td colspan="7" class="text-center text-muted">Không có sản phẩm nào</td>
            </tr>
            <tr th:each="sp, stat : ${sanPhamPage.content}">
                <td th:text="${sanPhamPage.number * sanPhamPage.size + stat.index + 1}"></td>
                <td>
                    <input type="checkbox" name="ids" th:value="${sp.id}" class="form-check-input row-checkbox"
                           th:attr="data-name=${sp.name}">
                </td>
                <td th:text="${sp.name}"></td>
                <td th:text="${#numbers.formatDecimal(sp.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                <td th:text="${sp.loaiSanPham != null ? sp.loaiSanPham.name : ''}"></td>
                <td th:text="${sp.status}"></td>
                <td><a th:href="@{/san-pham/edit/{id}(id=${sp.id})}">Sửa</a></td>
            </tr>
            </tbody>
        </table>

        <!-- Phan trang -->
        <nav th:if="${sanPhamPage.totalPages > 0}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${sanPhamPage.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/san-pham(name=${name}, price=${price}, idLoaiSp=${idLoaiSp}, page=${sanPhamPage.number - 1})}">Trước</a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link">Trang <span th:text="${sanPhamPage.number + 1}"></span> / <span th:text="${sanPhamPage.totalPages}"></span></span>
                </li>
                <li class="page-item" th:classappend="${sanPhamPage.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/san-pham(name=${name}, price=${price}, idLoaiSp=${idLoaiSp}, page=${sanPhamPage.number + 1})}">Sau</a>
                </li>
            </ul>
        </nav>

    </form>
</div>

<!-- Modal xac nhan xoa, hien thi ten cac san pham da chon -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Xác nhận xóa</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Bạn có muốn xóa tất cả sản phẩm đã chọn?</p>
                <ul id="selectedNamesList"></ul>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Yes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const checkboxes = document.querySelectorAll('.row-checkbox');
    const btnDelete = document.getElementById('btnDelete');
    const selectedNamesList = document.getElementById('selectedNamesList');
    const deleteForm = document.getElementById('deleteForm');
    let confirmModal;

    document.addEventListener('DOMContentLoaded', function () {
        confirmModal = new bootstrap.Modal(document.getElementById('confirmDeleteModal'));
    });

    function updateDeleteButtonState() {
        const anyChecked = Array.from(checkboxes).some(cb => cb.checked);
        btnDelete.disabled = !anyChecked;
    }

    checkboxes.forEach(cb => cb.addEventListener('change', updateDeleteButtonState));
    updateDeleteButtonState();

    btnDelete.addEventListener('click', function () {
        const checked = Array.from(checkboxes).filter(cb => cb.checked);
        if (checked.length === 0) return;

        selectedNamesList.innerHTML = '';
        checked.forEach(cb => {
            const li = document.createElement('li');
            li.textContent = cb.getAttribute('data-name');
            selectedNamesList.appendChild(li);
        });

        confirmModal.show();
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
        deleteForm.submit();
    });
</script>
</body>
</html>
